name: Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
      with:
        persist-credentials: false
        fetch-depth: 8

    - name: 🪞Mirror
      continue-on-error: true
      run: git config --global credential.username "SYSUljz" && git push -f https://SYSUljz:${{ secrets.GITLAB }}@gitlab.com/SYSUljz/SYSUljz.gitlab.io.git main:blog

    - name: 🏗Generate
      run: npm i && npm run build

    - name: 🚀Deploy
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        branch: master
        folder: public

    - name: 🚀Deploy
      uses: JamesIves/github-pages-deploy-action@v4
      continue-on-error: true
      with:
        repository-name: SYSUljz/SYSUljz
        token: ${{ secrets.TOKEN }}
        branch: master
        folder: profile
